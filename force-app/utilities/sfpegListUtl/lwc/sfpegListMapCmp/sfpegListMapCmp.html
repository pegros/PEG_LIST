<template>
    <div class={cardClass}>
        <lightning-card title={cardTitle} icon-name={cardIcon} >
            <template lwc:if={hideList}>
                <div class="headerActions" slot="actions">
                    <lightning-button-icon  icon-name="utility:refresh"     size={buttonSize}
                                            variant="border-filled"
                                            alternative-text={refreshTitle} title={refreshTitle}
                                            onclick={handleRefresh}>
                    </lightning-button-icon>
                </div>
            </template>

            <figure  role="group" aria-label={mapLegend} class={mapClass}>
                <template lwc:if={mapMarkers}>
                    <lightning-map  class="sfpegListMap"
                                    style={mapStyle}
                                    map-markers={mapMarkers}
                                    markers-title={figureCaption}
                                    options={mapOptions} 
                                    list-view={listView}
                                    selected-marker-value={selectedMarkerValue}
                                    onmarkerselect={handleMarkerSelect}>
                    </lightning-map>
                </template>
                <template lwc:else>
                    <img    class="slds-illustration__svg slds-m-bottom_none"
                            src="/img/chatter/OpenRoad.svg">
                    <figcaption class="slds-text-align_center slds-text-color_weak">
                        <p class="slds-text-body_regular">
                            {figureCaption}
                        </p>
                    </figcaption>
                </template>
            </figure>

            <!-- Map Data Loader -->
            <c-sfpeg-list-cmp   lwc:ref="listLoader"
                                card-title={resultCardTitle}
                                card-class={listCardClass}
                                display-height={displayHeight}
                                button-size={buttonSize}
                                object-api-name={objectApiName} 
                                record-id={recordId} 
                                config-name={configName}
                                action-config-name={actionConfigName}
                                footer-config-name={footerConfigName}
                                context-string={contextString}
                                parent-context={listContext}
                                show-search="true"
                                show-export={showExport}
                                max-size={maxSize}
                                onload={handleRecordLoad}
                                is-debug={isDebug}
                                is-debug-fine={isDebug} 
                                force-hidden={hideList} >
            </c-sfpeg-list-cmp>

            <!-- Debug Information Display -->
            <template lwc:if={isDebug}>
                <div slot="footer" class="slds-theme_default footerContent">
                    <dl class="slds-dl_horizontal">
                        <dt class="slds-dl_horizontal__label slds-truncate">Context:</dt>
                        <dd class="slds-dl_horizontal__detail">{objectApiName}: {recordId}</dd>
                        <dt class="slds-dl_horizontal__label slds-truncate">Locations:</dt>
                        <dd class="slds-dl_horizontal__detail">{configName}</dd>
                        <dt class="slds-dl_horizontal__label slds-truncate">Current Config:</dt>
                        <dd class="slds-dl_horizontal__detail">{mapMarkersSerialized}</dd>
                        <dt class="slds-dl_horizontal__label slds-truncate">Documentation:</dt>
                        <dd class="slds-dl_horizontal__detail">
                            <lightning-formatted-url    value="https://github.com/pegros/PEG_LIST/blob/master/help/sfpegListMapCmp.md"
                                                        label="See Help on GitHub"
                                                        target="_blank">
                            </lightning-formatted-url>
                        </dd>
                    </dl>
                </div>
            </template>
        </lightning-card>
    </div>
</template>
